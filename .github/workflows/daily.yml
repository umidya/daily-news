name: Daily news digest

on:
  schedule:
    # PRIMARY trigger is a Cloudflare Worker Cron at 11:30 UTC that fires
    # workflow_dispatch. The crons below are independent fallbacks: if the
    # Worker misses (as on 2026-05-26), these provide multiple shots so the
    # briefing still publishes before Midya's breakfast.
    #
    # GitHub Actions free-tier crons are delayed 3-7h under load, and a single
    # entry can be delayed catastrophically. Multiple independent entries get
    # independent scheduling decisions, so the probability all are severely
    # late approaches zero. Off-hour minutes (avoid :00) reduce contention.
    #
    # The same-day skip guard in pipeline.py exits in ~30s once today.json
    # has been published with >=6 stories, so duplicate fires cost ~nothing.
    - cron: "23 10 * * *"   # 03:23 PT
    - cron: "53 10 * * *"   # 03:53 PT
    - cron: "23 11 * * *"   # 04:23 PT — just before Worker should fire
    - cron: "53 11 * * *"   # 04:53 PT
    - cron: "23 12 * * *"   # 05:23 PT
    - cron: "53 12 * * *"   # 05:53 PT
    - cron: "23 13 * * *"   # 06:23 PT
    - cron: "47 13 * * *"   # 06:47 PT — last shot before 7am wake
  workflow_dispatch:  # manual trigger; this is what the Cloudflare Worker calls
    inputs:
      force:
        description: "Bypass same-day skip guard and republish today.json"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write  # needed to push state branch + gh-pages

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DAILY_NEWS_BASE_URL: ${{ vars.DAILY_NEWS_BASE_URL }}
      DAILY_NEWS_FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Restore state branch
        run: |
          mkdir -p data
          if git ls-remote --exit-code --heads origin state > /dev/null 2>&1; then
            git fetch origin state
            git worktree add state-wt origin/state
            if [ -f state-wt/articles.db ]; then
              cp state-wt/articles.db data/articles.db
              echo "Restored articles.db from state branch."
            fi
          else
            echo "No state branch yet; first run."
          fi

      - name: Run digest pipeline
        run: python -m daily_news run

      # Publish FIRST so a transient hiccup in the internal state-branch push
      # (a known GitHub server-side "fatal error in commit_refs" class) can
      # never block today's briefing from reaching the app.
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true  # preserve old episodes
          user_name: daily-news-bot
          user_email: bot@daily-news.local
          commit_message: "publish: ${{ github.run_id }}"

      # Internal dedup state. Marked continue-on-error: a failure here would
      # only cost cross-day dedup quality for one day — the user-facing
      # briefing is already published above. Retry absorbs transient errors.
      - name: Save state branch
        continue-on-error: true
        run: |
          set +e
          # state-wt exists as a worktree from "Restore state branch" iff the
          # remote state branch already exists. Otherwise create a fresh orphan.
          if [ ! -e state-wt ]; then
            git worktree add -b state state-wt
          fi
          cp data/articles.db state-wt/articles.db
          cd state-wt
          git config user.name "daily-news-bot"
          git config user.email "bot@daily-news.local"
          git add articles.db
          if git diff --cached --quiet; then
            echo "No changes to articles.db; nothing to push."
            exit 0
          fi
          git commit -m "state: $(date -u +%FT%TZ)"
          for attempt in 1 2 3; do
            if git push origin HEAD:state; then
              echo "State branch pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; sleeping $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::warning::State branch push failed after 3 attempts. Today's briefing is already published; only cross-day dedup is affected."
          exit 1

      # Loud verification: if anything in the chain ever breaks again such
      # that today.json on Pages is not today's briefing, fail the job so
      # Midya gets a GitHub failure notification instead of silently seeing
      # stale content in the app. Checks the machine-readable dateIso field
      # (the human-readable "date" field is "Wednesday, May 27, 2026") and
      # that the digest actually contains stories.
      - name: Verify today.json on Pages
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          BASE_URL="${DAILY_NEWS_BASE_URL:-https://umidya.github.io/daily-news}"
          EXPECTED_DATE="$(date -u +%F)"
          echo "Verifying ${BASE_URL}/today.json reports dateIso=${EXPECTED_DATE} with stories..."
          # gh-pages deploy is async; poll for up to ~5 minutes with cache-busting.
          for attempt in $(seq 1 30); do
            STATUS="$(curl -fsSL "${BASE_URL}/today.json?t=$(date -u +%s%N)" 2>/dev/null \
              | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d.get("dateIso",""), len(d.get("digestStories") or []), len(d.get("topStories") or []))' \
              2>/dev/null || echo "")"
            ACTUAL_DATE="$(echo "$STATUS" | awk '{print $1}')"
            DIGEST_N="$(echo "$STATUS" | awk '{print $2}')"
            TOP_N="$(echo "$STATUS" | awk '{print $3}')"
            if [ "${ACTUAL_DATE}" = "${EXPECTED_DATE}" ] && [ "${DIGEST_N:-0}" -gt 0 ]; then
              echo "OK: today.json dateIso=${ACTUAL_DATE}, digestStories=${DIGEST_N}, topStories=${TOP_N}."
              exit 0
            fi
            echo "Attempt ${attempt}/30: dateIso='${ACTUAL_DATE}' digestStories=${DIGEST_N:-0} (want dateIso=${EXPECTED_DATE} with >0 stories); waiting 10s..."
            sleep 10
          done
          echo "::error::today.json on ${BASE_URL} did not reach dateIso=${EXPECTED_DATE} with stories after 5 minutes. The app will show yesterday's briefing."
          exit 1
