name: Daily news digest

on:
  schedule:
    # GitHub Actions free-tier scheduled crons can be silently delayed or
    # skipped when the platform is under load. To survive that, we fire FOUR
    # times every morning. The pipeline has a same-day skip guard, so the
    # first run that succeeds publishes today.json and the subsequent runs
    # short-circuit cheaply — no duplicate Claude/TTS spend.
    #   11:30 UTC = 04:30 PDT  (primary, intended publish time)
    #   12:00 UTC = 05:00 PDT  (backup #1)
    #   12:30 UTC = 05:30 PDT  (backup #2; 30 min before 06:00 local notif)
    #   14:00 UTC = 07:00 PDT  (last-resort backup)
    - cron: "30 11 * * *"
    - cron: "0 12 * * *"
    - cron: "30 12 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:  # manual trigger from the Actions tab

permissions:
  contents: write  # needed to push state branch + gh-pages

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DAILY_NEWS_BASE_URL: ${{ vars.DAILY_NEWS_BASE_URL }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Restore state branch
        run: |
          mkdir -p data
          if git ls-remote --exit-code --heads origin state > /dev/null 2>&1; then
            git fetch origin state
            git worktree add state-wt origin/state
            if [ -f state-wt/articles.db ]; then
              cp state-wt/articles.db data/articles.db
              echo "Restored articles.db from state branch."
            fi
          else
            echo "No state branch yet; first run."
          fi

      - name: Run digest pipeline
        run: python -m daily_news run

      - name: Save state branch
        run: |
          mkdir -p state-wt
          if [ ! -d state-wt/.git ]; then
            git worktree add -b state state-wt 2>/dev/null || git worktree add state-wt state || true
          fi
          cp data/articles.db state-wt/articles.db
          cd state-wt
          git config user.name "daily-news-bot"
          git config user.email "bot@daily-news.local"
          git add articles.db
          git commit -m "state: $(date -u +%FT%TZ)" || echo "No changes to commit."
          git push origin HEAD:state

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true  # preserve old episodes
          user_name: daily-news-bot
          user_email: bot@daily-news.local
          commit_message: "publish: ${{ github.run_id }}"
