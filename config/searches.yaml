# Google News RSS searches. Used to fill gaps where a dedicated feed does not
# exist - especially niche local stories.
#
# Each query becomes:
#   https://news.google.com/rss/search?q=<encoded query>&hl=en-CA&gl=CA&ceid=CA:en
#
# Google News results have unknown origin sources, so credibility is capped at
# 0.70 unless we can promote based on the redirected publisher (future work).

searches:
  # Local: Kamloops + Sun Peaks
  - query: "Kamloops"
    topics: [kamloops_sun_peaks]
    credibility: 0.70
  - query: "Sun Peaks"
    topics: [kamloops_sun_peaks]
    credibility: 0.70
  - query: "Sun Peaks Resort"
    topics: [kamloops_sun_peaks]
    credibility: 0.70

  # AirBnb policies in BC municipalities
  - query: "Vancouver short-term rental"
    topics: [airbnb_policy]
    credibility: 0.70
  - query: "Vancouver Airbnb"
    topics: [airbnb_policy]
    credibility: 0.70
  - query: "Langley short-term rental"
    topics: [airbnb_policy]
    credibility: 0.70
  - query: "Sun Peaks short-term rental"
    topics: [airbnb_policy]
    credibility: 0.70
  - query: "BC Bill 35 short-term rental"
    topics: [airbnb_policy]
    credibility: 0.70

  # International student policy in Canada
  - query: "Canada international students"
    topics: [intl_students_canada]
    credibility: 0.70
  - query: "study permit Canada"
    topics: [intl_students_canada]
    credibility: 0.70
  - query: "post-graduation work permit Canada"
    topics: [intl_students_canada]
    credibility: 0.70

  # Higher ed in Canada -- includes named institutions because each is a
  # potential consulting client. Surface news about new presidents, strategy
  # shifts, enrolment changes, layoffs, marketing/brand work.
  - query: "Canadian universities"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "Canadian colleges enrolment"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "UBC University British Columbia"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "SFU Simon Fraser University"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "Thompson Rivers University"
    topics: [higher_ed_canada, kamloops_sun_peaks]
    credibility: 0.75
  - query: "BCIT British Columbia Institute Technology"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "University Toronto strategy"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "McGill University"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "Canadian university president appointed"
    topics: [higher_ed_canada]
    credibility: 0.70
  - query: "Canadian university marketing brand"
    topics: [higher_ed_canada, marketing]
    credibility: 0.70

  # Misc -- BC food recalls (family safety) + cross-cutting items.
  # CFIA does not expose a working RSS feed, so these searches are the
  # primary source for the recall part of Misc.
  - query: "British Columbia food recall"
    topics: [misc]
    credibility: 0.85
  - query: "CFIA recall"
    topics: [misc]
    credibility: 0.90
  - query: "Canada food recall listeria OR salmonella OR e. coli"
    topics: [misc]
    credibility: 0.85
  - query: "BC public health alert"
    topics: [misc]
    credibility: 0.80
  - query: "BC wildfire evacuation"
    topics: [misc]
    credibility: 0.75

  # Marketing trade coverage (Marketing Brew and HBR shut down public RSS)
  - query: "CMO appointment"
    topics: [marketing]
    credibility: 0.70
  - query: "marketing strategy AI"
    topics: [marketing, ai]
    credibility: 0.70

  # Higher ed global (Times Higher Education blocks RSS)
  - query: "global university enrolment"
    topics: [higher_ed_global]
    credibility: 0.70
  - query: "international student visa policy"
    topics: [intl_students_canada, higher_ed_global]
    credibility: 0.75

  # Canadian + North American real estate
  - query: "Canadian mortgage rates"
    topics: [canadian_real_estate]
    credibility: 0.70
  - query: "Bank of Canada interest rate"
    topics: [canadian_real_estate]
    credibility: 0.75
  - query: "US housing market"
    topics: [canadian_real_estate]
    credibility: 0.70
  - query: "North American real estate brokerage"
    topics: [canadian_real_estate]
    credibility: 0.70

  # EXP Realty -- specifically tracked per Midya's interest.
  - query: "eXp Realty"
    topics: [canadian_real_estate]
    credibility: 0.75
  - query: "eXp World Holdings"
    topics: [canadian_real_estate]
    credibility: 0.75
  - query: "eXp Realty Canada"
    topics: [canadian_real_estate]
    credibility: 0.75
