# How the digest scores articles for relevance to your interests.
#
# Each topic has:
#   weight    relative importance multiplier on the relevance score
#   keywords  phrases that, if present in title/snippet, score the topic
#   negatives optional phrases that subtract from the topic match
#
# The scorer takes the highest-scoring topic match per article. Articles
# tagged by their feed/search source already start with a topic seed, so
# keywords mainly serve to *boost* matching content within mixed feeds.
#
# Weights above 1.0 mean "I care about this more than baseline." The relative
# numbers are what matter - the absolute scale is rescaled at the end.

scoring_weights:
  relevance: 0.50
  credibility: 0.20
  recency: 0.15
  novelty: 0.15

# Articles older than this many hours are dropped before scoring.
recency_cutoff_hours: 36

# After scoring, this many articles get sent to Claude as candidates.
# Claude picks the final cut.
candidate_pool_size: 25

# Target final number of stories in the digest.
target_story_count: 12

